<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard View</title>
    <link rel="stylesheet" href="../projects/dashboard.css">
</head>
<body>

    <div class="dashboard">
        <h1>Car Showroom Dashboard</h1>

        <!-- صندوق الصور مع الأسهم -->
        <div class="image-slider">
            <img src="../assets/images/projects/WhatsApp-Image-2025-02-15-at-04.11.4162bd973b.jpg" alt="Dashboard Image 1" class="active">
            <img src="assets/images/dashboard/dashboard2.png" alt="Dashboard Image 2">
            <img src="assets/images/dashboard/dashboard3.png" alt="Dashboard Image 3">

            <!-- الأسهم للتنقل -->
            <button class="arrow arrow-left" onclick="changeImage(-1)">&#10094;</button>
            <button class="arrow arrow-right" onclick="changeImage(1)">&#10095;</button>
        </div>

        <!-- عرض التقرير -->
        <div class="report">
            <h2>Report</h2>
            <iframe src="../Final-Report.pdf" width="100%" height="600px"></iframe>
        </div>

        <!-- قسم الملاحظات -->
        <div class="notes">
            <h3>Notes</h3>
            <p>Here you can add additional comments or observations regarding the dashboard or the sales data. Use this section to analyze trends and provide insights that can help improve the car showroom's performance.</p>
        </div>
    </div>

    <script>
        let currentImageIndex = 0;
        const images = document.querySelectorAll(".image-slider img");
        const totalImages = images.length;

        // تغيير الصورة بناءً على الاتجاه
        function changeImage(direction) {
            images[currentImageIndex].classList.remove("active");
            currentImageIndex += direction;

            if (currentImageIndex < 0) {
                currentImageIndex = totalImages - 1;
            } else if (currentImageIndex >= totalImages) {
                currentImageIndex = 0;
            }

            images[currentImageIndex].classList.add("active");
        }

        // تغيير الصورة تلقائيًا كل 3 ثواني
        setInterval(() => {
            changeImage(1); // الانتقال للصورة التالية
        }, 3000);
    </script>

</body>
</html>
